schema: spec-driven

context: |
  Project: m199-page
  Stack: pnpm workspaces — NestJS API (apps/api), Vite React (apps/web), Prisma/PostgreSQL (packages/db)
  Architecture: 3-package monorepo with shared tooling at root
  Testing: Vitest across all packages — 97 tests passing
  Style: ESLint + Prettier + TypeScript strict
  Persistence: hybrid (OpenSpec + Engram)

strict_tdd: true

testing:
  detected: 2026-07-01
  strict_tdd: true
  test_runner:
    command: pnpm test
    framework: vitest 3.2.4
  layers:
    unit: true
    integration: true
    e2e: false
  coverage:
    available: false
    command: null
  quality_tools:
    linter:
      available: true
      command: pnpm lint
    type_checker:
      available: true
      command: pnpm typecheck
    formatter:
      available: true
      command: pnpm format

rules:
  proposal:
    - Include rollback plan for risky changes.
  specs:
    - Use Given/When/Then for scenarios.
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY).
  design:
    - Include sequence diagrams for complex flows.
    - Document architecture decisions with rationale.
  tasks:
    - Group by phase, use hierarchical numbering.
    - Keep tasks completable in one session.
  apply:
    - Follow existing code patterns.
    - Prefer strict TDD when enabled.
  verify:
    - Record exact commands and results.
    - Report gaps when tooling is unavailable.
  archive:
    - Warn before merging destructive deltas.
